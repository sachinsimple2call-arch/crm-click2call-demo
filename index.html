<!DOCTYPE html>
<html>
<head>
  <title>S2C Mini CRM</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    body { font-family: Arial; background:#f4f6f9; margin:0; }
    .navbar { background:#1f2937; padding:10px; display:flex; gap:20px; }
    .navbar button { background:none; color:white; border:none; cursor:pointer; font-size:16px; }
    .section { display:none; padding:20px; }
    .active { display:block; }
    input, select, textarea { padding:8px; margin:5px 0; width:250px; }
    button.primary { background:#2563eb; color:white; border:none; padding:8px 12px; cursor:pointer; }
    table { border-collapse: collapse; width:100%; background:white; }
    th, td { border:1px solid #ddd; padding:8px; }
    th { background:#e5e7eb; }
  </style>
</head>
<body>

<div class="navbar">
  <button onclick="showSection('callSection')">Call</button>
  <button onclick="showSection('settingsSection')">Settings</button>
  <button onclick="showSection('reportSection')">Reports</button>
</div>

<!-- CALL SECTION -->
<div id="callSection" class="section active">
  <h2>Create Call</h2>

  <input id="customerName" placeholder="Customer Name"><br>
  <input id="customerNumber" placeholder="Customer Number"><br>

  <select id="cliDropdown"></select><br>

  <button class="primary" onclick="createCall()">Initiate Call</button>

  <h3>Call Details</h3>
  <p><b>Call ID:</b> <span id="callId"></span></p>
  <p><b>Time:</b> <span id="callTime"></span></p>
  <p><b>Attempts:</b> <span id="attemptCount">0</span></p>

  <select id="dispositionDropdown"></select><br>
  <textarea id="notes" placeholder="Notes"></textarea><br>
  <button class="primary" onclick="saveCallLog()">Save Call Log</button>
</div>

<!-- SETTINGS SECTION -->
<div id="settingsSection" class="section">
  <h2>Settings</h2>

  <h3>Manage CLI</h3>
  <input id="newCli" placeholder="Add CLI">
  <button onclick="addCLI()">Add</button>
  <button onclick="deleteCLI()">Delete Selected</button>

  <h3>Manage Disposition</h3>
  <input id="newDisposition" placeholder="Add Disposition">
  <button onclick="addDisposition()">Add</button>
  <button onclick="deleteDisposition()">Delete Selected</button>
</div>

<!-- REPORT SECTION -->
<div id="reportSection" class="section">
  <h2>Reports</h2>
  <button class="primary" onclick="downloadCSV()">Download CSV</button>
  <br><br>
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Number</th>
        <th>Attempts</th>
        <th>Call Time</th>
        <th>Call ID</th>
        <th>Disposition</th>
        <th>Notes</th>
      </tr>
    </thead>
    <tbody id="reportTable"></tbody>
  </table>
</div>

<script>
const supabaseClient = supabase.createClient(
  "https://ovqaypngqsreeufizndg.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92cWF5cG5ncXNyZWV1Zml6bmRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3MTk5MDksImV4cCI6MjA4NzI5NTkwOX0.oTVCvIqbhE-lUj7t6u-2oqLare6dO3myKH-EJRHFvIM"
);

let currentCallId = "";
let attemptCounter = 0;

function showSection(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  if(id === "reportSection") loadReports();
}

function generateCallId(){
  return "CALL-" + Date.now();
}

function createCall(){
  currentCallId = generateCallId();
  attemptCounter++;
  document.getElementById("callId").innerText = currentCallId;
  document.getElementById("callTime").innerText = new Date().toLocaleString();
  document.getElementById("attemptCount").innerText = attemptCounter;
}

async function saveCallLog(){
  const data = {
    name: document.getElementById("customerName").value,
    number: document.getElementById("customerNumber").value,
    attempts: attemptCounter,
    call_time: document.getElementById("callTime").innerText,
    call_id: currentCallId,
    disposition: document.getElementById("dispositionDropdown").value,
    notes: document.getElementById("notes").value
  };

  const { error } = await supabaseClient.from("call_logs").insert([data]);
  if(error) alert("Error saving");
  else alert("Call log saved");
}

async function addCLI(){
  const cli = document.getElementById("newCli").value;
  await supabaseClient.from("cli_settings").insert([{cli}]);
  loadCLI();
}

async function deleteCLI(){
  const cli = document.getElementById("cliDropdown").value;
  await supabaseClient.from("cli_settings").delete().eq("cli", cli);
  loadCLI();
}

async function loadCLI(){
  const { data } = await supabaseClient.from("cli_settings").select("*");
  const dropdown = document.getElementById("cliDropdown");
  dropdown.innerHTML="";
  data.forEach(row=>{
    const option = document.createElement("option");
    option.value=row.cli;
    option.text=row.cli;
    dropdown.appendChild(option);
  });
}

async function addDisposition(){
  const name = document.getElementById("newDisposition").value;
  await supabaseClient.from("dispositions").insert([{name}]);
  loadDisposition();
}

async function deleteDisposition(){
  const name = document.getElementById("dispositionDropdown").value;
  await supabaseClient.from("dispositions").delete().eq("name", name);
  loadDisposition();
}

async function loadDisposition(){
  const { data } = await supabaseClient.from("dispositions").select("*");
  const dropdown = document.getElementById("dispositionDropdown");
  dropdown.innerHTML="";
  data.forEach(row=>{
    const option = document.createElement("option");
    option.value=row.name;
    option.text=row.name;
    dropdown.appendChild(option);
  });
}

async function loadReports(){
  const { data } = await supabaseClient.from("call_logs").select("*");
  const table = document.getElementById("reportTable");
  table.innerHTML="";
  data.forEach(row=>{
    table.innerHTML += `
      <tr>
        <td>${row.name}</td>
        <td>${row.number}</td>
        <td>${row.attempts}</td>
        <td>${row.call_time}</td>
        <td>${row.call_id}</td>
        <td>${row.disposition}</td>
        <td>${row.notes}</td>
      </tr>`;
  });
}

async function downloadCSV(){
  const { data } = await supabaseClient.from("call_logs").select("*");
  let csv="Name,Number,Attempts,Call Time,Call ID,Disposition,Notes\n";
  data.forEach(r=>{
    csv+=`${r.name},${r.number},${r.attempts},${r.call_time},${r.call_id},${r.disposition},${r.notes}\n`;
  });
  const blob = new Blob([csv], {type:"text/csv"});
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href=url;
  a.download="report.csv";
  a.click();
}

window.onload = function(){
  loadCLI();
  loadDisposition();
};
</script>

</body>
</html>
