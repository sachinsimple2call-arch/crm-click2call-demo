<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Simple2Call CRM Final</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Arial;margin:20px}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border:1px solid #ccc;padding:6px}
button{padding:5px;margin:2px}
.section{border:1px solid #ddd;padding:15px;margin-bottom:20px}
</style>
</head>
<body>

<h2>🚀 Simple2Call CRM (Final Stable)</h2>

<div class="section">
<h3>⚙ Settings</h3>

Agent:
<input type="text" id="agentInput">

CLI:
<input type="text" id="cliInput">

Login Key:
<input type="text" id="loginKeyInput">

<button onclick="saveSettings()">Save Settings</button>
</div>

<div class="section">
<h3>📂 Upload Customers CSV</h3>
<input type="file" id="csvFile">
<button onclick="uploadCSV()">Upload</button>
</div>

<div class="section">
<h3>📞 Customers</h3>
<button onclick="loadCustomers()">Refresh</button>

<table>
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Phone</th>
<th>Attempts</th>
<th>Action</th>
</tr>
</thead>
<tbody id="customerTable"></tbody>
</table>
</div>

<div class="section">
<h3>📜 History</h3>
<div id="historyBox"></div>
</div>

<div class="section">
<h3>📊 Report</h3>
<div id="reportBox"></div>
<button onclick="loadReport()">Refresh Report</button>
</div>

<script>

const supabase = window.supabase.createClient(
"https://ovqaypngqsreeufizndg.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92cWF5cG5ncXNyZWV1Zml6bmRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3MTk5MDksImV4cCI6MjA4NzI5NTkwOX0.oTVCvIqbhE-lUj7t6u-2oqLare6dO3myKH-EJRHFvIM"
);

// ================= SETTINGS =================

async function saveSettings(){
let agent=document.getElementById("agentInput").value;
let cli=document.getElementById("cliInput").value;
let loginkey=document.getElementById("loginKeyInput").value;

await supabase.from("settings").delete().neq("id",0);
await supabase.from("settings").insert([{agent_id:agent,cli:cli,loginkey:loginkey}]);

alert("Settings Saved");
}

// ================= CSV UPLOAD =================

async function uploadCSV(){

const file=document.getElementById("csvFile").files[0];
if(!file){alert("Select CSV");return;}

const text=await file.text();
const rows=text.split("\n");

let list=[];

for(let i=1;i<rows.length;i++){
if(!rows[i]) continue;

let cols=rows[i].split(",");
let name=cols[0]?.trim();
let phone=cols[1]?.trim();

if(phone){
list.push({name:name,phone:phone});
}
}

if(list.length===0){
alert("No valid data");
return;
}

const {error}=await supabase.from("customers").insert(list);

if(error){alert("Error: "+error.message);return;}

alert(list.length+" Customers Added");
loadCustomers();
loadReport();
}

// ================= LOAD CUSTOMERS =================

async function loadCustomers(){

const {data,error}=await supabase
.from("customers")
.select("*")
.order("id",{ascending:false});

if(error){alert(error.message);return;}

let html="";
data.forEach(c=>{
html+=`
<tr>
<td>${c.id}</td>
<td>${c.name||""}</td>
<td>${c.phone}</td>
<td>${c.attempts}</td>
<td>
<button onclick="makeCall(${c.id},'${c.phone}')">Call</button>
<button onclick="showHistory(${c.id})">History</button>
</td>
</tr>
`;
});

document.getElementById("customerTable").innerHTML=html;
}

// ================= CALL FUNCTION =================

async function makeCall(id,number){

let {data:settings}=await supabase.from("settings").select("*").limit(1);

if(!settings || settings.length===0){
alert("Save Settings First");
return;
}

let agent=settings[0].agent_id;
let cli=settings[0].cli;
let loginkey=settings[0].loginkey;

let url=`https://ccs1.simple2call.com/cim/page?tenant=ccslite&script=click2dial&function=call&loginkey=${loginkey}&agent=${agent}&from=${cli}&to=${number}`;

fetch(url);

let disposition=prompt("Enter Disposition:");
if(!disposition) return;

let notes=prompt("Enter Notes:")||"";

await supabase.from("call_logs").insert([{
customer_id:id,
agent_id:agent,
cli:cli,
disposition:disposition,
notes:notes
}]);

let {data:customer}=await supabase
.from("customers")
.select("attempts")
.eq("id",id)
.single();

let newAttempts=(customer?.attempts||0)+1;

await supabase.from("customers")
.update({attempts:newAttempts})
.eq("id",id);

alert("Call Saved");
loadCustomers();
loadReport();
}

// ================= HISTORY =================

async function showHistory(id){

const {data}=await supabase
.from("call_logs")
.select("*")
.eq("customer_id",id)
.order("id",{ascending:false});

let html="";
data.forEach(h=>{
html+=`
<p>
Agent: ${h.agent_id}<br>
CLI: ${h.cli}<br>
Disposition: ${h.disposition}<br>
Notes: ${h.notes}<br>
Date: ${new Date(h.created_at).toLocaleString()}
</p><hr>
`;
});

document.getElementById("historyBox").innerHTML=html;
}

// ================= REPORT =================

async function loadReport(){

let {count:totalCustomers}=await supabase
.from("customers")
.select("*",{count:"exact",head:true});

let {count:totalCalls}=await supabase
.from("call_logs")
.select("*",{count:"exact",head:true});

document.getElementById("reportBox").innerHTML=
"Total Customers: "+totalCustomers+
"<br>Total Calls: "+totalCalls;
}

loadCustomers();
loadReport();

</script>

</body>
</html>
