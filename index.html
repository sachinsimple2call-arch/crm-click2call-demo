<!DOCTYPE html>
<html>
<head>
<title>S2C CRM PRO VERSION</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;background:#f4f6f9;margin:0}
.navbar{background:#111827;padding:12px;display:flex;gap:20px}
.navbar button{background:none;color:white;border:none;cursor:pointer;font-size:14px}
.section{display:none;padding:20px}
.active{display:block}
input,select,textarea{padding:8px;margin:5px 0;width:250px}
button.primary{background:#2563eb;color:white;border:none;padding:8px 12px;cursor:pointer}
button.secondary{background:#6b7280;color:white;border:none;padding:6px 10px;cursor:pointer}
table{border-collapse:collapse;width:100%;background:white}
th,td{border:1px solid #ddd;padding:8px;text-align:left}
th{background:#e5e7eb}
a{cursor:pointer;color:#2563eb;text-decoration:underline}
</style>
</head>

<body>

<div class="navbar">
<button onclick="showSection('call')">Call</button>
<button onclick="showSection('settings')">Settings</button>
<button onclick="showSection('report')">Reports</button>
<button onclick="loadCustomers()">Refresh</button>
</div>

<!-- CALL SECTION -->
<div id="call" class="section active">

<h3>Call Filter</h3>
<select id="callFilter" onchange="applyCallFilter()">
<option value="all">All</option>
<option value="fresh">Fresh</option>
<option value="follow">Follow Up</option>
<option value="today">Today Added</option>
</select>

<hr>

<h3>Lead Information</h3>
<div id="leadInfo"></div>
<div id="leadCounter"></div>

<button class="secondary" onclick="prevLead()">Previous</button>
<button class="secondary" onclick="nextLead()">Next</button>

<hr>

Agent: <span id="agentDisplay"></span><br>
<select id="cliDropdown"></select><br>

<button class="primary" onclick="createCall()">📞 Initiate Call</button>

<p><b>Call ID:</b> <span id="callId"></span></p>
<p><b>Time:</b> <span id="callTime"></span></p>

<select id="dispositionDropdown"></select><br>

<label>
<input type="checkbox" id="followUpCheckbox"> Mark as Follow Up
</label><br>

<textarea id="notes" placeholder="Notes"></textarea><br>

<button class="primary" onclick="saveCall()">💾 Save Call</button>

<h4>Customer History</h4>
<div id="history"></div>

</div>

<!-- SETTINGS -->
<div id="settings" class="section">

<h3>Agent</h3>
<input id="agentInput">
<button onclick="saveAgent()">Save</button>

<h3>CLI</h3>
<input id="newCli">
<button onclick="addCLI()">Add</button><br>
<select id="cliDelete"></select>
<button onclick="deleteCLI()">Delete</button>

<h3>Disposition</h3>
<input id="newDisp">
<button onclick="addDisposition()">Add</button><br>
<select id="dispDelete"></select>
<button onclick="deleteDisposition()">Delete</button>

<hr>

<h3>Upload CSV</h3>
<input type="file" id="csvFile" accept=".csv">
<button onclick="uploadCSV()">Upload CSV</button>

<br><br>
<button onclick="clearCustomers()">Clear All Customers</button>

</div>

<!-- REPORT SECTION -->
<div id="report" class="section">

<h3>Reports Dashboard</h3>

<table>
<tr>
<th>Category</th>
<th>Overall</th>
<th>Today</th>
</tr>

<tr>
<td>Total Data</td>
<td><a onclick="loadReportData('total','overall')"><span id="totalOverall">0</span></a></td>
<td><a onclick="loadReportData('total','today')"><span id="totalToday">0</span></a></td>
</tr>

<tr>
<td>Fresh (Attempts=0)</td>
<td><a onclick="loadReportData('fresh','overall')"><span id="freshOverall">0</span></a></td>
<td><a onclick="loadReportData('fresh','today')"><span id="freshToday">0</span></a></td>
</tr>

<tr>
<td>Follow Up</td>
<td><a onclick="loadReportData('follow','overall')"><span id="followOverall">0</span></a></td>
<td><a onclick="loadReportData('follow','today')"><span id="followToday">0</span></a></td>
</tr>
</table>

<br>
<button onclick="downloadFilteredCSV()">Download CSV</button>

<hr>

<table>
<thead>
<tr>
<th>Name</th>
<th>Number</th>
<th>Attempts</th>
<th>Follow Up</th>
<th>Created At</th>
</tr>
</thead>
<tbody id="reportTable"></tbody>
</table>

</div>

<script>

const supabaseClient = supabase.createClient(
"https://ovqaypngqsreeufizndg.supabase.co",
"YOUR_PUBLIC_ANON_KEY"
);

let customers=[];
let currentIndex=0;
let agentId="";
let callStarted=false;
let currentCallId="";
let currentCustomer=null;
let currentReportFilter=null;

function showSection(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
if(id==="report") loadReports();
}

async function uploadCSV(){
const file=document.getElementById("csvFile").files[0];
if(!file) return alert("Select CSV");

const reader=new FileReader();
reader.onload=async function(e){
let rows=e.target.result.split(/\r?\n/);
let insertData=[];

for(let i=1;i<rows.length;i++){
if(!rows[i]) continue;
let cols=rows[i].split(",");
if(cols.length<2) continue;
insertData.push({
name:cols[0].trim(),
number:cols[1].trim(),
attempts:0,
follow_up:false
});
}

await supabaseClient.from("customers").insert(insertData);
alert("Uploaded");
loadCustomers();
};
reader.readAsText(file);
}

async function clearCustomers(){
if(!confirm("Delete All?")) return;
await supabaseClient.from("customers").delete().not("id","is",null);
loadCustomers();
}

async function loadCustomers(){
const {data}=await supabaseClient.from("customers").select("*").order("id");
customers=data||[];
currentIndex=0;
showLead();
}

function showLead(){
if(!customers.length){
document.getElementById("leadInfo").innerText="No Leads";
document.getElementById("leadCounter").innerText="0 / 0";
return;
}
currentCustomer=customers[currentIndex];
document.getElementById("leadCounter").innerText=`${currentIndex+1}/${customers.length}`;
document.getElementById("leadInfo").innerText=
`Name: ${currentCustomer.name} | Number: ${currentCustomer.number} | Attempts: ${currentCustomer.attempts||0}`;
loadHistory();
}

function nextLead(){ if(currentIndex<customers.length-1){currentIndex++;showLead();}}
function prevLead(){ if(currentIndex>0){currentIndex--;showLead();}}

async function createCall(){
if(!currentCustomer) return alert("No Lead");
currentCallId="CALL-"+Date.now();
callStarted=true;
document.getElementById("callId").innerText=currentCallId;
document.getElementById("callTime").innerText=new Date().toLocaleString();
alert("Call Initiated");
}

async function saveCall(){
if(!callStarted) return alert("Start Call First");

let followUp=document.getElementById("followUpCheckbox").checked;

await supabaseClient.from("customers")
.update({
attempts:(currentCustomer.attempts||0)+1,
follow_up:followUp
})
.eq("id",currentCustomer.id);

alert("Saved");
callStarted=false;
loadCustomers();
}

async function loadHistory(){}

async function applyCallFilter(){
let filter=document.getElementById("callFilter").value;
let query=supabaseClient.from("customers").select("*");
let today=new Date(); today.setHours(0,0,0,0);

if(filter==="fresh") query=query.eq("attempts",0);
if(filter==="follow") query=query.eq("follow_up",true);
if(filter==="today") query=query.gte("created_at",today.toISOString());

const {data}=await query.order("id");
customers=data||[];
currentIndex=0;
showLead();
}

async function loadReports(){
let today=new Date(); today.setHours(0,0,0,0);
const {data}=await supabaseClient.from("customers").select("*");

let totalOverall=data.length;
let totalToday=data.filter(d=>new Date(d.created_at)>=today).length;

let freshOverall=data.filter(d=>d.attempts===0).length;
let freshToday=data.filter(d=>d.attempts===0 && new Date(d.created_at)>=today).length;

let followOverall=data.filter(d=>d.follow_up===true).length;
let followToday=data.filter(d=>d.follow_up===true && new Date(d.created_at)>=today).length;

document.getElementById("totalOverall").innerText=totalOverall;
document.getElementById("totalToday").innerText=totalToday;
document.getElementById("freshOverall").innerText=freshOverall;
document.getElementById("freshToday").innerText=freshToday;
document.getElementById("followOverall").innerText=followOverall;
document.getElementById("followToday").innerText=followToday;
}

async function loadReportData(type,dateType){
currentReportFilter={type,dateType};
let query=supabaseClient.from("customers").select("*");
let today=new Date(); today.setHours(0,0,0,0);

if(type==="fresh") query=query.eq("attempts",0);
if(type==="follow") query=query.eq("follow_up",true);
if(dateType==="today") query=query.gte("created_at",today.toISOString());

const {data}=await query.order("created_at",{ascending:false});

let table=document.getElementById("reportTable");
table.innerHTML="";
data.forEach(r=>{
table.innerHTML+=`
<tr>
<td>${r.name}</td>
<td>${r.number}</td>
<td>${r.attempts||0}</td>
<td>${r.follow_up?"Yes":"No"}</td>
<td>${r.created_at}</td>
</tr>`;
});
}

async function downloadFilteredCSV(){
if(!currentReportFilter) return alert("Select report first");

let query=supabaseClient.from("customers").select("*");
let today=new Date(); today.setHours(0,0,0,0);

if(currentReportFilter.type==="fresh") query=query.eq("attempts",0);
if(currentReportFilter.type==="follow") query=query.eq("follow_up",true);
if(currentReportFilter.dateType==="today") query=query.gte("created_at",today.toISOString());

const {data}=await query;

let csv="Name,Number,Attempts,Follow Up,Created At\n";
data.forEach(r=>{
csv+=`${r.name},${r.number},${r.attempts||0},${r.follow_up},${r.created_at}\n`;
});

let blob=new Blob([csv],{type:"text/csv"});
let link=document.createElement("a");
link.href=URL.createObjectURL(blob);
link.download="report.csv";
link.click();
}

window.onload=function(){
loadCustomers();
};

</script>
</body>
</html>
