<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Simple2Call CRM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; background:#f4f6f9; padding:20px; }
.section { background:#fff; padding:15px; margin-bottom:20px; border-radius:8px; }
table { width:100%; border-collapse:collapse; }
th,td { border:1px solid #ddd; padding:8px; }
th { background:#eee; }
button { padding:6px 10px; cursor:pointer; }
input,select { padding:5px; }
</style>
</head>
<body>

<div class="section">
<h3>Settings</h3>

Agent:
<input type="text" id="agentId" value="sachin_test">

<h4>Upload CSV</h4>
<input type="file" id="csvFile">
<button onclick="uploadCSV()">Upload</button>
<span id="uploadCount"></span>

<h4>Add CLI</h4>
<input type="text" id="cliInput">
<button onclick="saveCLI()">Save CLI</button>

<h4>Add Disposition</h4>
<input type="text" id="dispInput">
<button onclick="saveDisposition()">Save</button>

</div>

<div class="section">
<h3>Call Section</h3>

Select CLI:
<select id="cliDropdown"></select>

<table>
<thead>
<tr>
<th>Name</th>
<th>Number</th>
<th>Call</th>
<th>Attempts</th>
<th>Disposition</th>
</tr>
</thead>
<tbody id="callTable"></tbody>
</table>
</div>

<div class="section">
<h3>Report</h3>
<div id="reportSummary"></div>
<button onclick="downloadReport()">Download CSV</button>
<button onclick="clearData()">Clear Data</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
const supabase = window.supabase.createClient(
"https://ovqaypngqsreeufizndg.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92cWF5cG5ncXNyZWV1Zml6bmRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3MTk5MDksImV4cCI6MjA4NzI5NTkwOX0.oTVCvIqbhE-lUj7t6u-2oqLare6dO3myKH-EJRHFvIM"
);

const baseUrl="https://ccs1.simple2call.com/cim/page";
const tenant="ccslite";
const loginkey="lHCOU3y2Hg41xZv71WMg";

window.onload = async function(){
await loadSettings();
await loadCustomers();
};

async function saveCLI(){
let agent=agentId.value;
let cli=cliInput.value.trim();
if(!cli) return alert("Enter CLI");

await supabase.from("settings").insert({agent_id:agent,cli});
cliInput.value="";
await loadSettings();
alert("Saved");
}

async function saveDisposition(){
let agent=agentId.value;
let disp=dispInput.value.trim();
if(!disp) return alert("Enter Disposition");

await supabase.from("settings").insert({agent_id:agent,disposition:disp});
dispInput.value="";
alert("Saved");
}

async function loadSettings(){
let agent=agentId.value;
let {data}=await supabase.from("settings").select("*").eq("agent_id",agent);

cliDropdown.innerHTML="";
data?.forEach(r=>{
if(r.cli){
let opt=document.createElement("option");
opt.value=r.cli;
opt.text=r.cli;
cliDropdown.appendChild(opt);
}
});
}

async function uploadCSV(){
let agent=agentId.value;
let file=csvFile.files[0];
if(!file) return alert("Select CSV");

let text=await file.text();
let rows=text.split("\n");
let count=0;

for(let i=1;i<rows.length;i++){
let cols=rows[i].split(",");
if(cols.length>=2){
await supabase.from("customers").insert({
agent_id:agent,
name:cols[0].trim(),
number:cols[1].trim()
});
count++;
}
}

uploadCount.innerText="Uploaded: "+count;
await loadCustomers();
}

async function loadCustomers(){
let agent=agentId.value;
let {data}=await supabase.from("customers").select("*").eq("agent_id",agent);

callTable.innerHTML="";

for(let cust of data||[]){

let {count}=await supabase.from("calls")
.select("*",{count:"exact",head:true})
.eq("customer_id",cust.id);

let row=document.createElement("tr");

row.innerHTML=`
<td>${cust.name}</td>
<td>${cust.number}</td>
<td><button onclick="makeCall('${cust.id}','${cust.number}',${count||0})">Call</button></td>
<td>${count||0}</td>
<td>
<input id="disp_${cust.id}">
<button onclick="saveCallDisposition('${cust.id}')">Save</button>
</td>
`;

callTable.appendChild(row);
}

updateReport();
}

async function makeCall(custId,number,attempt){
let agent=agentId.value;
let cli=cliDropdown.value;

let url=`${baseUrl}?tenant=${tenant}&script=click2dial&function=call&loginkey=${loginkey}&agent=${agent}&from=${cli}&to=${number}`;

let iframe=document.createElement("iframe");
iframe.style.display="none";
iframe.src=url;
document.body.appendChild(iframe);

let callId="CALL"+Date.now();

await supabase.from("calls").insert({
customer_id:custId,
agent_id:agent,
attempt:attempt+1,
call_time:new Date(),
call_id:callId
});

await loadCustomers();
}

async function saveCallDisposition(custId){
let disp=document.getElementById("disp_"+custId).value;

await supabase.from("calls")
.update({disposition:disp})
.eq("customer_id",custId);

alert("Saved");
}

async function updateReport(){
let agent=agentId.value;
let {data:calls}=await supabase.from("calls").select("*").eq("agent_id",agent);
reportSummary.innerHTML=`Total Calls: ${calls?.length||0}`;
}

async function downloadReport(){
let agent=agentId.value;
let {data:calls}=await supabase.from("calls").select("*").eq("agent_id",agent);

let csv="CustomerID,Attempt,CallID,Disposition\n";
calls?.forEach(c=>{
csv+=`${c.customer_id},${c.attempt},${c.call_id},${c.disposition||""}\n`;
});

let blob=new Blob([csv],{type:"text/csv"});
let url=URL.createObjectURL(blob);
let a=document.createElement("a");
a.href=url;
a.download="report.csv";
a.click();
}

async function clearData(){
let agent=agentId.value;
await supabase.from("customers").delete().eq("agent_id",agent);
await supabase.from("calls").delete().eq("agent_id",agent);
alert("Cleared");
await loadCustomers();
}

</script>
</body>
</html>
