<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Simple CRM Demo - Stable Version</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; margin:20px; }
table { width:100%; border-collapse: collapse; margin-top:10px;}
th,td { border:1px solid #ccc; padding:8px; text-align:left;}
button { padding:6px 10px; margin:2px; cursor:pointer;}
input,select { padding:5px; margin:3px;}
.section { border:1px solid #ddd; padding:15px; margin-bottom:20px;}
</style>
</head>

<body>

<h2>🚀 Simple CRM Demo (Final Stable)</h2>

<div class="section">
<h3>⚙ Settings</h3>

Agent ID:
<input type="text" id="agentInput">
<button onclick="saveAgent()">Save Agent</button>

<br><br>

Add CLI:
<input type="text" id="cliInput">
<button onclick="addCLI()">Add CLI</button>

<br><br>

Add Disposition:
<input type="text" id="dispInput">
<button onclick="addDisposition()">Add Disposition</button>

<br><br>
<button onclick="clearProject()">🗑 Clear Project Data</button>

</div>

<div class="section">
<h3>📂 Upload Customers CSV</h3>
<input type="file" id="csvFile">
<button onclick="uploadCSV()">Upload</button>
</div>

<div class="section">
<h3>📞 Call Page</h3>

<button onclick="loadCustomers()">🔄 Refresh</button>

<table>
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Phone</th>
<th>Attempts</th>
<th>Action</th>
</tr>
</thead>
<tbody id="customerTable"></tbody>
</table>

</div>

<div class="section">
<h3>📜 History</h3>
<div id="historyBox"></div>
</div>

<div class="section">
<h3>📊 Report</h3>
<div id="reportBox"></div>
<button onclick="loadReport()">Refresh Report</button>
</div>

<script>

// ============================
// SUPABASE CONFIG
// ============================

const SUPABASE_URL = "https://ovqaypngqsreeufizndg.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92cWF5cG5ncXNyZWV1Zml6bmRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3MTk5MDksImV4cCI6MjA4NzI5NTkwOX0.oTVCvIqbhE-lUj7t6u-2oqLare6dO3myKH-EJRHFvIM";


// ============================
// SETTINGS
// ============================

async function saveAgent(){
let val = document.getElementById("agentInput").value;

await supabase.from("settings").delete().neq("id",0);
await supabase.from("settings").insert([{agent_id:val}]);

alert("Agent Saved");
}

async function addCLI(){
let val = document.getElementById("cliInput").value;

await supabase.from("cli_numbers").insert([{cli:val}]);
alert("CLI Added");
}

async function addDisposition(){
let val = document.getElementById("dispInput").value;

await supabase.from("dispositions").insert([{name:val}]);
alert("Disposition Added");
}

async function clearProject(){
await supabase.from("call_logs").delete().neq("id",0);
await supabase.from("customers").delete().neq("id",0);
alert("All Data Cleared");
loadCustomers();
loadReport();
}

// ============================
// CSV UPLOAD
// ============================

async function uploadCSV(){
const file = document.getElementById("csvFile").files[0];
if(!file){ alert("Select CSV"); return; }

const text = await file.text();
const rows = text.split("\n");

let customers=[];

for(let i=1;i<rows.length;i++){
if(!rows[i]) continue;

let cols = rows[i].split(",");
let name = cols[0]?.trim();
let phone = cols[1]?.trim();

if(phone){
customers.push({name:name, phone:phone});
}
}

if(customers.length==0){
alert("No valid data");
return;
}

const {error} = await supabase.from("customers").insert(customers);

if(error){
alert("Insert Error: "+error.message);
return;
}

alert(customers.length+" Customers Added");
loadCustomers();
}

// ============================
// LOAD CUSTOMERS
// ============================

async function loadCustomers(){

const {data,error} = await supabase
.from("customers")
.select("*")
.order("id",{ascending:false})
.limit(20);

if(error){ alert(error.message); return;}

let table="";
data.forEach(c=>{
table+=`
<tr>
<td>${c.id}</td>
<td>${c.name||""}</td>
<td>${c.phone}</td>
<td>${c.attempts}</td>
<td>
<button onclick="initiateCall(${c.id},'${c.phone}')">Call</button>
<button onclick="showHistory(${c.id})">History</button>
</td>
</tr>
`;
});

document.getElementById("customerTable").innerHTML=table;
}

// ============================
// CALL FUNCTION
// ============================

async function initiateCall(id,phone){

// SIMPLE2CALL API (Replace Your URL)
let apiUrl="https://ccs1.simple2call.com/cim/page?tenant=ccslite&script=click2dial&function=call&loginkey=${loginkey}&agent=${agent}&from=${cli}&to=${number};

fetch(apiUrl);

let disposition = prompt("Enter Disposition:");
let notes = prompt("Enter Notes:");

if(!disposition) return;

let {data:agentData} = await supabase.from("settings").select("*").limit(1);
let agent = agentData?.[0]?.agent_id || "default";

await supabase.from("call_logs").insert([{
customer_id:id,
agent_id:agent,
cli:"",
disposition:disposition,
notes:notes,
call_status:"Completed"
}]);

await supabase.from("customers")
.update({attempts: supabase.sql`attempts + 1`})
.eq("id",id);

alert("Call Saved");

loadCustomers();
loadReport();
}

// ============================
// HISTORY
// ============================

async function showHistory(id){

const {data,error} = await supabase
.from("call_logs")
.select("*")
.eq("customer_id",id)
.order("id",{ascending:false});

if(error){ alert(error.message); return;}

let html="";
data.forEach(h=>{
html+=`
<p>
Disposition: ${h.disposition} |
Notes: ${h.notes} |
Date: ${new Date(h.created_at).toLocaleString()}
</p>
<hr>
`;
});

document.getElementById("historyBox").innerHTML=html;
}

// ============================
// REPORT
// ============================

async function loadReport(){

let {count:totalCustomers} = await supabase
.from("customers")
.select("*",{count:"exact", head:true});

let {count:totalCalls} = await supabase
.from("call_logs")
.select("*",{count:"exact", head:true});

document.getElementById("reportBox").innerHTML=
"Total Customers: "+totalCustomers+
"<br>Total Calls: "+totalCalls;
}

// ============================

loadCustomers();
loadReport();

</script>

</body>
</html>
