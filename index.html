<!DOCTYPE html>
<html>
<head>
<title>S2C CRM PRO FINAL</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<style>
body {font-family:Arial;background:#f4f6f9;margin:0}
.navbar {background:#111827;padding:12px;display:flex;gap:20px}
.navbar button {background:none;color:white;border:none;cursor:pointer;font-size:16px}
.section {display:none;padding:20px}
.active {display:block}
input,select,textarea {padding:8px;margin:5px 0;width:250px}
button.primary {background:#2563eb;color:white;border:none;padding:8px 12px;cursor:pointer}
table {border-collapse:collapse;width:100%;background:white}
th,td {border:1px solid #ddd;padding:8px}
th {background:#e5e7eb}
</style>
</head>
<body>

<div class="navbar">
<button onclick="showSection('call')">Call</button>
<button onclick="showSection('settings')">Settings</button>
<button onclick="showSection('report')">Reports</button>
</div>

<!-- CALL -->
<div id="call" class="section active">
<h2>Call Panel</h2>
<p><b>Agent ID:</b> <span id="agentDisplay"></span></p>

<h3>Lead</h3>
<p id="leadInfo"></p>
<button onclick="prevLead()">Previous</button>
<button onclick="nextLead()">Next</button>

<h3>Call</h3>
<select id="cliDropdown"></select><br>
<button class="primary" onclick="createCall()">Initiate Call</button>

<p><b>Call ID:</b> <span id="callId"></span></p>
<p><b>Time:</b> <span id="callTime"></span></p>

<select id="dispositionDropdown"></select><br>
<textarea id="notes" placeholder="Notes"></textarea><br>
<button class="primary" onclick="saveCall()">Save Call Log</button>
</div>

<!-- SETTINGS -->
<div id="settings" class="section">
<h2>Settings</h2>

<h3>Agent</h3>
<input id="agentInput" placeholder="Agent ID">
<button onclick="saveAgent()">Save Agent</button>

<h3>CLI</h3>
<input id="newCli" placeholder="Add CLI">
<button onclick="addCLI()">Add CLI</button><br>
<select id="cliDelete"></select>
<button onclick="deleteCLI()">Delete Selected CLI</button>

<h3>Disposition</h3>
<input id="newDisp" placeholder="Add Disposition">
<button onclick="addDisposition()">Add</button><br>
<select id="dispDelete"></select>
<button onclick="deleteDisposition()">Delete Selected</button>

<h3>Upload Customers CSV</h3>
<input type="file" id="csvFile">
<button onclick="uploadCSV()">Upload CSV</button><br>
<button onclick="clearCustomers()">Clear All Customers</button>
</div>

<!-- REPORT -->
<div id="report" class="section">
<h2>Reports</h2>
<p id="reportTotal"></p>
<button onclick="downloadCSV()">Download CSV</button>
<br><br>
<table>
<thead>
<tr>
<th>Name</th>
<th>Number</th>
<th>Attempts</th>
<th>Call ID</th>
<th>Disposition</th>
<th>Notes</th>
</tr>
</thead>
<tbody id="reportTable"></tbody>
</table>
<br>
<button onclick="prevPage()">Prev</button>
<button onclick="nextPage()">Next</button>
</div>

<script>
const supabaseClient = supabase.createClient(
"https://ovqaypngqsreeufizndg.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92cWF5cG5ncXNyZWV1Zml6bmRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3MTk5MDksImV4cCI6MjA4NzI5NTkwOX0.oTVCvIqbhE-lUj7t6u-2oqLare6dO3myKH-EJRHFvIM"
);

let customers=[];
let currentIndex=0;
let currentCallId="";
let agentId="";
let currentPage=0;
let pageSize=20;

function showSection(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
if(id==="report") loadReports();
}

function generateCallId(){
return "CALL-"+Date.now();
}

/* ================= SETTINGS ================= */

async function saveAgent(){
let agent=document.getElementById("agentInput").value;
if(!agent){alert("Enter Agent ID");return;}
const {error}=await supabaseClient.from("agent_settings").insert([{agent_id:agent}]);
if(error){alert("Error Saving Agent");}
else{alert("Agent Saved");loadAgent();}
}

async function loadAgent(){
const {data}=await supabaseClient.from("agent_settings")
.select("*").order("created_at",{ascending:false}).limit(1);
if(data.length){
agentId=data[0].agent_id;
document.getElementById("agentDisplay").innerText=agentId;
}
}

async function addCLI(){
let cli=document.getElementById("newCli").value;
if(!cli){alert("Enter CLI");return;}
const {error}=await supabaseClient.from("cli_settings").insert([{cli}]);
if(error){alert("CLI Exists");}
else{alert("CLI Added");loadCLI();}
}

async function deleteCLI(){
let cli=document.getElementById("cliDelete").value;
await supabaseClient.from("cli_settings").delete().eq("cli",cli);
alert("CLI Deleted");
loadCLI();
}

async function loadCLI(){
const {data}=await supabaseClient.from("cli_settings").select("*");
let drop=document.getElementById("cliDropdown");
let del=document.getElementById("cliDelete");
drop.innerHTML="";del.innerHTML="";
data.forEach(r=>{
drop.innerHTML+=`<option>${r.cli}</option>`;
del.innerHTML+=`<option>${r.cli}</option>`;
});
}

async function addDisposition(){
let name=document.getElementById("newDisp").value;
if(!name){alert("Enter Disposition");return;}
const {error}=await supabaseClient.from("dispositions").insert([{name}]);
if(error){alert("Exists");}
else{alert("Disposition Added");loadDisposition();}
}

async function deleteDisposition(){
let name=document.getElementById("dispDelete").value;
await supabaseClient.from("dispositions").delete().eq("name",name);
alert("Disposition Deleted");
loadDisposition();
}

async function loadDisposition(){
const {data}=await supabaseClient.from("dispositions").select("*");
let drop=document.getElementById("dispositionDropdown");
let del=document.getElementById("dispDelete");
drop.innerHTML="";del.innerHTML="";
data.forEach(r=>{
drop.innerHTML+=`<option>${r.name}</option>`;
del.innerHTML+=`<option>${r.name}</option>`;
});
}

async function uploadCSV(){
const file=document.getElementById("csvFile").files[0];
if(!file){alert("Select File");return;}
const text=await file.text();
const rows=text.split("\n").slice(1);
let count=0;
for(let row of rows){
let cols=row.split(",");
if(cols.length>=2){
await supabaseClient.from("customers")
.insert([{name:cols[0].trim(),number:cols[1].trim()}]);
count++;
}
}
alert(count+" Customers Uploaded");
loadCustomers();
}

async function clearCustomers(){
if(!confirm("Delete All Customers?"))return;
await supabaseClient.from("customers")
.delete().neq("id","00000000-0000-0000-0000-000000000000");
alert("Customers Cleared");
loadCustomers();
}

/* ================= CALL ================= */

async function loadCustomers(){
const {data}=await supabaseClient.from("customers").select("*");
customers=data;
currentIndex=0;
showLead();
}

function showLead(){
if(!customers.length){document.getElementById("leadInfo").innerText="No Leads";return;}
let c=customers[currentIndex];
document.getElementById("leadInfo").innerText=
`Name: ${c.name} | Number: ${c.number} | Attempts: ${c.attempts}`;
}

function nextLead(){if(currentIndex<customers.length-1){currentIndex++;showLead();}}
function prevLead(){if(currentIndex>0){currentIndex--;showLead();}}

async function createCall(){
let customer=customers[currentIndex];
if(!customer){alert("No Lead");return;}
let cli=document.getElementById("cliDropdown").value;
const apiURL=`https://ccs1.simple2call.com/cim/page?tenant=ccslite&script=click2dial&function=call&loginkey=lHCOU3y2Hg41xZv71WMg&agent=${agentId}&from=${cli}&to=${customer.number}`;
try{
await fetch(apiURL);
currentCallId=generateCallId();
document.getElementById("callId").innerText=currentCallId;
document.getElementById("callTime").innerText=new Date().toLocaleString();
alert("Call Initiated");
}catch(e){alert("API Error");}
}

async function saveCall(){
let customer=customers[currentIndex];
if(!currentCallId){alert("Initiate Call First");return;}
const {error}=await supabaseClient.from("call_logs").insert([{
customer_id:customer.id,
agent_id:agentId,
cli:document.getElementById("cliDropdown").value,
call_time:new Date(),
call_id:currentCallId,
disposition:document.getElementById("dispositionDropdown").value,
notes:document.getElementById("notes").value
}]);
if(error){alert("Error Saving");return;}
await supabaseClient.from("customers")
.update({attempts:customer.attempts+1})
.eq("id",customer.id);
alert("Call Log Saved");
currentCallId="";
loadCustomers();
}

/* ================= REPORT ================= */

async function loadReports(){
const from=currentPage*pageSize;
const to=from+pageSize-1;
const {data,count}=await supabaseClient
.from("call_logs")
.select("*, customers(name,number,attempts)",{count:"exact"})
.range(from,to);

document.getElementById("reportTotal").innerText=
"Total Calls: "+count;

let table=document.getElementById("reportTable");
table.innerHTML="";
data.forEach(r=>{
table.innerHTML+=`
<tr>
<td>${r.customers?.name||""}</td>
<td>${r.customers?.number||""}</td>
<td>${r.customers?.attempts||""}</td>
<td>${r.call_id}</td>
<td>${r.disposition}</td>
<td>${r.notes}</td>
</tr>`;
});
}

function nextPage(){currentPage++;loadReports();}
function prevPage(){if(currentPage>0){currentPage--;loadReports();}}

async function downloadCSV(){
const {data}=await supabaseClient
.from("call_logs")
.select("*, customers(name,number,attempts)");
if(!data.length){alert("No Data");return;}
let csv="Name,Number,Attempts,Call ID,Disposition,Notes\n";
data.forEach(r=>{
csv+=`${r.customers?.name},${r.customers?.number},${r.customers?.attempts},${r.call_id},${r.disposition},${r.notes}\n`;
});
const blob=new Blob([csv],{type:"text/csv"});
const link=document.createElement("a");
link.href=URL.createObjectURL(blob);
link.download="report.csv";
link.click();
alert("Report Downloaded");
}

/* ================= INIT ================= */

window.onload=function(){
loadAgent();
loadCLI();
loadDisposition();
loadCustomers();
}
</script>

</body>
</html>
