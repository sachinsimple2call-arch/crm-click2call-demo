<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Simple2Call CRM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; background:#f4f6f9; padding:20px; }
.section { background:#fff; padding:15px; margin-bottom:20px; border-radius:8px; }
table { width:100%; border-collapse:collapse; }
th,td { border:1px solid #ddd; padding:8px; }
th { background:#eee; }
button { padding:6px 10px; cursor:pointer; }
input,select { padding:5px; margin:5px 0; }
</style>
</head>
<body>

<h2>Simple2Call CRM - Click2Call</h2>

<div class="section">
<h3>Settings</h3>

Agent:
<input type="text" id="agentId" value="sachin_test">

<h4>Add CLI</h4>
<input type="text" id="cliInput">
<button onclick="saveCLI()">Save CLI</button>

<h4>Upload CSV (Name,Number)</h4>
<input type="file" id="csvFile">
<button onclick="uploadCSV()">Upload</button>
<span id="uploadCount"></span>

<br><br>
<button onclick="clearData()">Clear All Data</button>

</div>

<div class="section">
<h3>Call Section</h3>

Select CLI:
<select id="cliDropdown"></select>

<table>
<thead>
<tr>
<th>Name</th>
<th>Number</th>
<th>Call</th>
<th>Attempts</th>
<th>Disposition</th>
</tr>
</thead>
<tbody id="customerTable"></tbody>
</table>

</div>

<div class="section">
<h3>Report</h3>
<div id="reportSummary"></div>
<button onclick="downloadReport()">Download CSV</button>
</div>

<script>

const supabaseClient = window.supabase.createClient(
  "https://ovqaypngqsreeufizndg.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92cWF5cG5ncXNyZWV1Zml6bmRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3MTk5MDksImV4cCI6MjA4NzI5NTkwOX0.oTVCvIqbhE-lUj7t6u-2oqLare6dO3myKH-EJRHFvIM"
);

const baseUrl="https://ccs1.simple2call.com/cim/page";
const tenant="ccslite";
const loginkey="lHCOU3y2Hg41xZv71WMg";

window.onload = async function(){
  await loadCLI();
  await loadCustomers();
};

async function saveCLI(){
  let agent = agentId.value;
  let cli = cliInput.value.trim();
  if(!cli) return alert("Enter CLI");

  await supabaseClient.from("settings").insert({agent_id:agent, cli});
  cliInput.value="";
  alert("Saved to DB");
  await loadCLI();
}

async function loadCLI(){
  let agent = agentId.value;

  const { data } = await supabaseClient
    .from("settings")
    .select("cli")
    .eq("agent_id",agent);

  cliDropdown.innerHTML="";
  data?.forEach(row=>{
    if(row.cli){
      let opt=document.createElement("option");
      opt.value=row.cli;
      opt.textContent=row.cli;
      cliDropdown.appendChild(opt);
    }
  });
}

async function uploadCSV(){
  let agent=agentId.value;
  let file=csvFile.files[0];
  if(!file) return alert("Select CSV file");

  let text=await file.text();
  let rows=text.split("\n");
  let count=0;

  for(let i=1;i<rows.length;i++){
    let cols=rows[i].split(",");
    if(cols.length>=2){
      await supabaseClient.from("customers").insert({
        agent_id:agent,
        name:cols[0].trim(),
        number:cols[1].trim()
      });
      count++;
    }
  }

  uploadCount.innerText="Uploaded: "+count;
  await loadCustomers();
}

async function loadCustomers(){
  let agent=agentId.value;

  const { data } = await supabaseClient
    .from("customers")
    .select("*")
    .eq("agent_id",agent);

  customerTable.innerHTML="";

  for(let cust of data || []){

    const { count } = await supabaseClient
      .from("calls")
      .select("*",{count:"exact",head:true})
      .eq("customer_id",cust.id);

    let row=document.createElement("tr");

    row.innerHTML=`
    <td>${cust.name}</td>
    <td>${cust.number}</td>
    <td><button onclick="makeCall('${cust.id}','${cust.number}',${count||0})">Call</button></td>
    <td>${count||0}</td>
    <td>
      <input id="disp_${cust.id}">
      <button onclick="saveDisposition('${cust.id}')">Save</button>
    </td>
    `;

    customerTable.appendChild(row);
  }

  updateReport();
}

async function makeCall(custId,number,attempt){
  let agent=agentId.value;
  let cli=cliDropdown.value;

  let url=`${baseUrl}?tenant=${tenant}&script=click2dial&function=call&loginkey=${loginkey}&agent=${agent}&from=${cli}&to=${number}`;

  let iframe=document.createElement("iframe");
  iframe.style.display="none";
  iframe.src=url;
  document.body.appendChild(iframe);

  let callId="CALL"+Date.now();

  await supabaseClient.from("calls").insert({
    customer_id:custId,
    agent_id:agent,
    attempt:attempt+1,
    call_time:new Date(),
    call_id:callId
  });

  await loadCustomers();
}

async function saveDisposition(custId){
  let disp=document.getElementById("disp_"+custId).value;

  await supabaseClient
    .from("calls")
    .update({disposition:disp})
    .eq("customer_id",custId);

  alert("Disposition Saved");
}

async function updateReport(){
  let agent=agentId.value;
  const { data } = await supabaseClient
    .from("calls")
    .select("*")
    .eq("agent_id",agent);

  reportSummary.innerHTML="Total Calls: "+(data?.length || 0);
}

async function downloadReport(){
  let agent=agentId.value;

  const { data } = await supabaseClient
    .from("calls")
    .select("*")
    .eq("agent_id",agent);

  let csv="CustomerID,Attempt,CallID,Disposition\n";
  data?.forEach(c=>{
    csv+=`${c.customer_id},${c.attempt},${c.call_id},${c.disposition||""}\n`;
  });

  let blob=new Blob([csv],{type:"text/csv"});
  let url=URL.createObjectURL(blob);
  let a=document.createElement("a");
  a.href=url;
  a.download="report.csv";
  a.click();
}

async function clearData(){
  let agent=agentId.value;

  await supabaseClient.from("customers").delete().eq("agent_id",agent);
  await supabaseClient.from("calls").delete().eq("agent_id",agent);

  alert("All Data Cleared");
  await loadCustomers();
}

</script>
</body>
</html>
