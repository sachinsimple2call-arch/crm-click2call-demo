<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>S2C CRM FINAL STABLE</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;margin:0;background:#f4f6f9}
.navbar{background:#111827;padding:12px;color:white;display:flex;gap:15px}
.navbar button{background:#2563eb;border:none;color:white;padding:6px 12px;cursor:pointer;border-radius:4px}
.section{display:none;padding:20px}
.active{display:block}
input,select{padding:6px;margin:5px 0;width:100%}
button.primary{background:#2563eb;color:white;border:none;padding:8px 12px;margin-top:10px;cursor:pointer;border-radius:4px}
.card{background:white;padding:15px;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,0.1)}
.topbar{margin-bottom:10px;display:flex;gap:10px;align-items:center}
</style>
</head>
<body>

<div class="navbar">
<button onclick="showSection('crm')">CRM</button>
<button onclick="showSection('settings')">Settings</button>
<button onclick="showSection('upload')">Upload CSV</button>
</div>

<!-- CRM SECTION -->
<div id="crm" class="section active">
<div class="card">

<div class="topbar">
<button onclick="prevLead()">Previous</button>
<span id="leadCounter">0 / 0</span>
<button onclick="nextLead()">Next</button>
<button onclick="refreshLead()">Refresh</button>
</div>

<div>
Jump to Lead:
<input type="number" id="jumpNumber" style="width:80px">
<button onclick="jumpToLead()">Go</button>
</div>

<h3 id="customerName">Name</h3>
<p id="customerNumber">Number</p>

<select id="disposition">
<option value="">Select Disposition</option>
<option>Interested</option>
<option>Not Interested</option>
<option>Callback</option>
<option>Wrong Number</option>
<option>Not Connected</option>
</select>

<button class="primary" onclick="makeCall()">Call</button>
<button class="primary" onclick="saveAndNext()">Save & Next</button>
<button class="primary" onclick="saveAndStop()">Save & Stop</button>

</div>
</div>

<!-- SETTINGS -->
<div id="settings" class="section">
<div class="card">
<h3>Settings</h3>

<label>Agent</label>
<input id="agent">

<label>CLI</label>
<input id="cli">

<label>Loginkey</label>
<input id="loginkey">

<button class="primary" onclick="saveSettings()">Save Settings</button>
<button class="primary" onclick="clearCustomers()">Clear Customers</button>

</div>
</div>

<!-- UPLOAD -->
<div id="upload" class="section">
<div class="card">
<h3>Upload CSV</h3>
<input type="file" id="csvFile">
<button class="primary" onclick="uploadCSV()">Upload</button>
<button class="primary" onclick="downloadCSV()">Download CSV</button>
</div>
</div>

<script>

// ================= SUPABASE =================
const supabase = window.supabase.createClient(
"https://ovqaypngqsreeufizndg.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92cWF5cG5ncXNyZWV1Zml6bmRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3MTk5MDksImV4cCI6MjA4NzI5NTkwOX0.oTVCvIqbhE-lUj7t6u-2oqLare6dO3myKH-EJRHFvIM"
);

let leads = [];
let currentIndex = 0;

// ================= UI =================
function showSection(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

// ================= SETTINGS =================
function saveSettings(){
localStorage.setItem("agent",document.getElementById("agent").value);
localStorage.setItem("cli",document.getElementById("cli").value);
localStorage.setItem("loginkey",document.getElementById("loginkey").value);
alert("Settings Saved");
}

function loadSettings(){
document.getElementById("agent").value=localStorage.getItem("agent")||"";
document.getElementById("cli").value=localStorage.getItem("cli")||"";
document.getElementById("loginkey").value=localStorage.getItem("loginkey")||"";
}

function clearCustomers(){
leads=[];
currentIndex=0;
renderLead();
alert("All customers cleared");
}

// ================= LOAD LEADS =================
async function loadLeads(){
const {data}=await supabase.from("leads").select("*").order("id",{ascending:true});
leads=data||[];
renderLead();
}

function renderLead(){
if(leads.length===0){
document.getElementById("customerName").innerText="No Leads";
document.getElementById("customerNumber").innerText="";
document.getElementById("leadCounter").innerText="0 / 0";
return;
}
let lead=leads[currentIndex];
document.getElementById("customerName").innerText=lead.name;
document.getElementById("customerNumber").innerText=lead.number;
document.getElementById("leadCounter").innerText=(currentIndex+1)+" / "+leads.length;
}

// ================= NAVIGATION =================
function nextLead(){
if(currentIndex<leads.length-1){
currentIndex++;
renderLead();
}
}
function prevLead(){
if(currentIndex>0){
currentIndex--;
renderLead();
}
}
function jumpToLead(){
let num=parseInt(document.getElementById("jumpNumber").value);
if(num>0 && num<=leads.length){
currentIndex=num-1;
renderLead();
}
}
function refreshLead(){
renderLead();
}

// ================= CALL =================
function makeCall(){
let agent=localStorage.getItem("agent");
let cli=localStorage.getItem("cli");
let loginkey=localStorage.getItem("loginkey");
let number=leads[currentIndex].number;

let url=`https://ccs1.simple2call.com/cim/page?tenant=ccslite&script=click2dial&function=call&loginkey=${loginkey}&agent=${agent}&from=${cli}&to=${number}`;
window.open(url,"_blank");
}

// ================= SAVE =================
async function saveDisposition(){
let disp=document.getElementById("disposition").value;
await supabase.from("leads").update({disposition:disp}).eq("id",leads[currentIndex].id);
}

async function saveAndNext(){
await saveDisposition();
nextLead();
}

async function saveAndStop(){
await saveDisposition();
alert("Saved Successfully");
}

// ================= CSV =================
async function uploadCSV(){
let file=document.getElementById("csvFile").files[0];
if(!file) return;

let text=await file.text();
let rows=text.split("\n");

for(let i=1;i<rows.length;i++){
let cols=rows[i].split(",");
if(cols.length>=2){
await supabase.from("leads").insert([{name:cols[0],number:cols[1]}]);
}
}
alert("CSV Uploaded");
loadLeads();
}

function downloadCSV(){
let csv="Name,Number,Disposition\n";
leads.forEach(l=>{
csv+=`${l.name},${l.number},${l.disposition||""}\n`;
});
let blob=new Blob([csv],{type:"text/csv"});
let url=URL.createObjectURL(blob);
let a=document.createElement("a");
a.href=url;
a.download="report.csv";
a.click();
}

// ================= INIT =================
loadSettings();
loadLeads();

</script>
</body>
</html>
