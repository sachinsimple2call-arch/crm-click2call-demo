<!DOCTYPE html>
<html>
<head>
<title>S2C CRM - Final Working</title>
<style>
body {font-family: Arial; background:#f4f6f9; margin:20px;}
h2 {color:#333;}

.topbar {
  background:#fff;
  padding:15px;
  border-radius:8px;
  margin-bottom:20px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

input, button, select {
  padding:8px;
  margin:5px;
  border-radius:5px;
  border:1px solid #ccc;
}

button {
  background:#007bff;
  color:#fff;
  cursor:pointer;
}

button:hover {
  background:#0056b3;
}

table {
  width:100%;
  background:#fff;
  border-collapse:collapse;
  margin-top:20px;
}

th, td {
  padding:10px;
  border:1px solid #ddd;
  text-align:center;
}

th {
  background:#007bff;
  color:white;
}

.call-btn {
  background:green;
}

.edit-btn {
  background:orange;
}

.history-box {
  background:#fff;
  padding:15px;
  border-radius:8px;
  margin-top:20px;
}
</style>
</head>

<body>

<h2>📞 Simple2Call CRM Demo</h2>

<div class="topbar">
  <b>Agent ID:</b>
  <input type="text" id="agent" value="sachin_test">

  <b>CLI:</b>
  <input type="text" id="cli" value="918657009654">
</div>

<h3>Add Customer</h3>
<input type="text" id="custName" placeholder="Customer Name">
<input type="text" id="custNumber" placeholder="Mobile Number">
<button onclick="addCustomer()">Add</button>

<table id="customerTable">
<thead>
<tr>
<th>Name</th>
<th>Mobile</th>
<th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div class="history-box">
<h3>Call History</h3>

<select id="filterType" onchange="filterHistory()">
<option value="all">All</option>
<option value="success">Success</option>
<option value="failed">Failed</option>
</select>

<table id="historyTable">
<thead>
<tr>
<th>Customer</th>
<th>Number</th>
<th>Status</th>
<th>Time</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script>
let customers = [];
let callHistory = [];

function addCustomer() {
  let name = document.getElementById("custName").value;
  let number = document.getElementById("custNumber").value;

  if(name=="" || number==""){
    alert("Enter name and number");
    return;
  }

  customers.push({name:name, number:number});
  document.getElementById("custName").value="";
  document.getElementById("custNumber").value="";
  renderCustomers();
}

function renderCustomers(){
  let tbody = document.querySelector("#customerTable tbody");
  tbody.innerHTML="";
  
  customers.forEach((cust,index)=>{
    tbody.innerHTML+=`
      <tr>
        <td>${cust.name}</td>
        <td>
          <input type="text" value="${cust.number}" 
          onchange="updateNumber(${index}, this.value)">
        </td>
        <td>
          <button class="call-btn" onclick="makeCall(${index})">Call</button>
        </td>
      </tr>
    `;
  });
}

function updateNumber(index, value){
  customers[index].number=value;
}

function makeCall(index){
  let agent = document.getElementById("agent").value;
  let cli = document.getElementById("cli").value;
  let number = customers[index].number;

  if(agent=="" || cli==""){
    alert("Agent or CLI missing");
    return;
  }

  // Dummy API simulation
  let status = Math.random()>0.3 ? "success" : "failed";

  callHistory.unshift({
    name: customers[index].name,
    number: number,
    status: status,
    time: new Date().toLocaleString()
  });

  renderHistory();
  alert("Call " + status.toUpperCase());
}

function renderHistory(filter="all"){
  let tbody = document.querySelector("#historyTable tbody");
  tbody.innerHTML="";

  let filtered = callHistory;

  if(filter=="success"){
    filtered = callHistory.filter(c=>c.status=="success");
  }
  if(filter=="failed"){
    filtered = callHistory.filter(c=>c.status=="failed");
  }

  filtered.forEach(call=>{
    tbody.innerHTML+=`
      <tr>
        <td>${call.name}</td>
        <td>${call.number}</td>
        <td>${call.status}</td>
        <td>${call.time}</td>
      </tr>
    `;
  });
}

function filterHistory(){
  let type = document.getElementById("filterType").value;
  renderHistory(type);
}
</script>

</body>
</html>
